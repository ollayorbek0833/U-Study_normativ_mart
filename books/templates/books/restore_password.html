{% extends "books/base.html" %}

{% block title %}Restore Password{% endblock %}
{% block page_heading %}Restore Password{% endblock %}

{% block actions %}
<a class="btn btn-ghost" href="{% url 'login' %}">Back to Login</a>
{% endblock %}

{% block content %}
<section class="surface form-shell">
    <form method="post" class="book-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Reset Password</button>
        </div>
    </form>
</section>
{% endblock %}
